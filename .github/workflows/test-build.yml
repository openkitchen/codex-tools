name: Test Tauri Build

on:
  push:
    branches:
      - "fix/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-artifacts:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: "macos-latest"
            target: "aarch64-apple-darwin"
            artifact_name: "codex-tools-macos-apple-silicon"
          - runner: "macos-15-intel"
            target: "x86_64-apple-darwin"
            artifact_name: "codex-tools-macos-intel"
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2

      - name: Install frontend dependencies
        run: npm ci

      - name: Disable updater artifacts for test build
        shell: bash
        run: |
          node <<'EOF'
          const fs = require("fs");
          const path = "src-tauri/tauri.conf.json";
          const config = JSON.parse(fs.readFileSync(path, "utf8"));
          config.bundle = config.bundle || {};
          config.bundle.createUpdaterArtifacts = false;
          if (config.plugins && config.plugins.updater) {
            config.plugins.updater.active = false;
          }
          fs.writeFileSync(path, JSON.stringify(config, null, 2) + "\n");
          EOF

      - name: Build unsigned app bundle
        run: npm run tauri -- build --target ${{ matrix.target }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          if-no-files-found: error
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz
